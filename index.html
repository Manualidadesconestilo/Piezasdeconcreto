<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piezas de Concreto - Programa Online</title>
  <style>
    :root {
      --bg-light: #ffffff;
      --bg-soft: #f8f6f4;
      --text-dark: #2b2b2b;
      --text-muted: #6a6a6a;
      --accent-main: #dca794;
      --accent-hover: #c98a74;
      --radius: 24px;
      --shadow: 0 15px 35px rgba(220, 167, 148, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', 'Segoe UI', sans-serif;
    }

    body {
      background-color: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
    }

    .announcement-bar {
      background: linear-gradient(90deg, #f4eae4, #ebdcd5);
      color: #8f6a5e;
      text-align: center;
      padding: 0.8rem;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    header {
      position: sticky;
      top: 0;
      background: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      z-index: 10;
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
    }

    nav h1 {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent-main);
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    nav ul li a {
      text-decoration: none;
      color: var(--text-dark);
      font-weight: 600;
      transition: color 0.3s ease;
    }

    nav ul li a:hover {
      color: var(--accent-main);
    }

      position: relative;
      padding: 9rem 1.5rem;
      text-align: center;
      background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)), url('image_673eab.png');
      background-size: cover;
      background-position: center;
      color: #fff;
      border-bottom-left-radius: 40px;
      border-bottom-right-radius: 40px;
    }
