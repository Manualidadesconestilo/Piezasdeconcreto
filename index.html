<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piezas de Concreto - Programa Online</title>
  <style>
    :root {
      --bg-light: #ffffff;
      --bg-soft: #f8f6f4;
      --text-dark: #2b2b2b;
      --text-muted: #6a6a6a;
      --accent-main: #dca794;
      --accent-hover: #c98a74;
      --radius: 24px;
      --shadow: 0 15px 35px rgba(220, 167, 148, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', 'Segoe UI', sans-serif;
    }

    body {
      background-color: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
    }

    .announcement-bar {
      background: linear-gradient(90deg, #f4eae4, #ebdcd5);
      color: #8f6a5e;
      text-align: center;
      padding: 0.8rem;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    header {
      position: sticky;
      top: 0;
      background: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      z-index: 10;
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
    }

    nav h1 {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent-main);
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    nav ul li a {
      text-decoration: none;
      color: var(--text-dark);
      font-weight: 600;
      transition: color 0.3s ease;
    }

    nav ul li a:hover {
      color: var(--accent-main);
    }

    .hero-section {
      position: relative;
      padding: 9rem 1.5rem;
      text-align: center;
      background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)), url('image_673eab.png');
      background-size: cover;
      background-position: center;
      color: #fff;
      border-bottom-left-radius: 40px;
      border-bottom-right-radius: 40px;
    }

    .hero-pill {
      background-color: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 0.6rem 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-block;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    .hero-section h1 {
      font-size: 3rem;
      line-height: 1.2;
      margin-bottom: 1.5rem;
      font-weight: 800;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .hero-section h1 span {
      color: #ffccbc;
    }

    .hero-section p {
      font-size: 1.25rem;
      max-width: 750px;
      margin: 0 auto 3.5rem auto;
      color: #f5f5f5;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .btn-cozy {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent-main), #d49580);
      color: white;
      padding: 1.2rem 4rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.2rem;
      box-shadow: 0 12px 30px rgba(220,167,148,0.45);
      transition: all 0.4s ease;
      text-transform: uppercase;
    }

    .btn-cozy:hover {
      background: linear-gradient(135deg, var(--accent-hover), #be816c);
      transform: translateY(-4px);
    }

    .main-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 6rem 1.5rem;
    }

    .block-title {
      text-align: center;
      font-size: 2.6rem;
      margin-bottom: 4rem;
      font-weight: 800;
    }

    .block-title span {
      color: var(--accent-main);
      background: rgba(220,167,148,0.1);
      padding: 0.2rem 0.8rem;
      border-radius: 12px;
    }

    .grid-learning {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2.5rem;
    }

    .card-learning {
      background: var(--bg-soft);
      padding: 2.5rem 2rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(220,167,148,0.12);
      transition: transform 0.3s ease;
    }

    .card-learning:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(220,167,148,0.25);
    }

    .card-learning .icon-pill {
      background: #ffffff;
      width: 75px;
      height: 75px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
    }

    .gallery-wrapper {
      background: var(--bg-soft);
      padding: 6rem 1.5rem;
      border-radius: 40px;
      margin: 2rem 0;
    }
